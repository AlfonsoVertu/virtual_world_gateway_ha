name: Build & Publish Add-ons

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: [eurooffice, nextcloud, vw_gateway]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Read addon version
        id: addon_version
        run: |
          VERSION=$(grep "^version:" ${{ matrix.addon }}/config.yaml | sed "s/version: *[\"']//;s/[\"']//")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.addon }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ matrix.addon }}-amd64:latest
            ghcr.io/${{ env.OWNER }}/${{ matrix.addon }}-amd64:${{ env.VERSION }}

      - name: Build and push (aarch64)
        if: matrix.addon != 'eurooffice'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.addon }}
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ matrix.addon }}-aarch64:latest
            ghcr.io/${{ env.OWNER }}/${{ matrix.addon }}-aarch64:${{ env.VERSION }}
