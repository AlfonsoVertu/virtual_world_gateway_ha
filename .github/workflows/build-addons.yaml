name: Build & Publish Add-ons

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: [eurooffice, nextcloud, virtual_world_dashboard, odoo, nginx_proxy_manager, adguard_home, elasticsearch, www_wordpress_suite, postgres_17, arpspoof, mariadb, webtop_kde]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Read addon version
        id: addon_version
        run: |
          VERSION=$(grep "^version:" ${{ matrix.addon }}/config.yaml | sed -E "s/version:[[:space:]]*[\"']?(.*)[\"']?/\1/" | tr -d "[:space:]\"'")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Fetch BUILD_FROM arguments
        run: |
          if [ -f ${{ matrix.addon }}/build.yaml ]; then
            BF_AMD64=$(grep "amd64:" ${{ matrix.addon }}/build.yaml | awk '{print $2}' | tr -d '"'"'"')
            BF_AARCH64=$(grep "aarch64:" ${{ matrix.addon }}/build.yaml | awk '{print $2}' | tr -d '"'"'"')
          fi
          
          if [ -z "$BF_AMD64" ]; then BF_AMD64="ghcr.io/home-assistant/amd64-base:latest"; fi
          if [ -z "$BF_AARCH64" ]; then BF_AARCH64="ghcr.io/home-assistant/aarch64-base:latest"; fi
          
          echo "BUILD_FROM_AMD64=$BF_AMD64" >> $GITHUB_ENV
          echo "BUILD_FROM_AARCH64=$BF_AARCH64" >> $GITHUB_ENV

      - name: Download alexbelgium shared helper scripts if needed
        run: |
          ADDON_DIR="${{ matrix.addon }}"
          DOCKERFILE="$ADDON_DIR/Dockerfile"
          BASE_URL="https://raw.githubusercontent.com/alexbelgium/hassio-addons/master/.templates"
          SCRIPTS=(ha_lsio.sh ha_automodules.sh ha_autoapps.sh ha_entrypoint.sh bashio-standalone.sh)
          for SCRIPT in "${SCRIPTS[@]}"; do
            if grep -q "COPY $SCRIPT" "$DOCKERFILE" && [ ! -f "$ADDON_DIR/$SCRIPT" ]; then
              echo "Downloading $SCRIPT for $ADDON_DIR..."
              curl -fsSL "$BASE_URL/$SCRIPT" -o "$ADDON_DIR/$SCRIPT" || \
              curl -fsSL "https://raw.githubusercontent.com/alexbelgium/hassio-addons/master/$SCRIPT" -o "$ADDON_DIR/$SCRIPT" || \
              echo "#!/bin/bash" > "$ADDON_DIR/$SCRIPT"
              chmod +x "$ADDON_DIR/$SCRIPT"
            fi
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.addon }}
          platforms: linux/amd64
          push: true
          build-args: |
             BUILD_FROM=${{ env.BUILD_FROM_AMD64 }}
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ matrix.addon }}-amd64:latest
            ghcr.io/${{ env.OWNER }}/${{ matrix.addon }}-amd64:${{ env.VERSION }}

      - name: Build and push (aarch64)
        if: matrix.addon != 'eurooffice'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.addon }}
          platforms: linux/arm64
          push: true
          build-args: |
             BUILD_FROM=${{ env.BUILD_FROM_AARCH64 }}
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ matrix.addon }}-aarch64:latest
            ghcr.io/${{ env.OWNER }}/${{ matrix.addon }}-aarch64:${{ env.VERSION }}
