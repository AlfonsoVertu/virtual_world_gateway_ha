name: Build & Publish EuroOffice Add-on

on:
  push:
    branches: [master]
    paths:
      - eurooffice/**
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read addon version
        id: addon_version
        run: |
          VERSION=$(grep "^version:" eurooffice/config.yaml | sed "s/version: *[\"']//;s/[\"']//")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64
        uses: docker/build-push-action@v5
        with:
          context: ./eurooffice
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/eurooffice-amd64:latest
            ghcr.io/${{ env.OWNER }}/eurooffice-amd64:${{ env.VERSION }}
          build-args: |
            BUILD_FROM=ghcr.io/euro-office/documentserver:latest
