name: "EuroOffice Document Server"
description: "ONLYOFFICE-based document server for Home Assistant, providing collaborative editing for various document types."
version: "1.0.0"
slug: "eurooffice"
init: false
arch:
  - aarch64
  - amd64
startup: services
boot: auto
map:
  - config:rw
  - share:rw
  - media:rw
options:
  jwt_enabled: true
  jwt_secret: "my_jwt_secret"
  example_enabled: true
schema:
  jwt_enabled: bool
  jwt_secret: password
  example_enabled: bool
ports:
  80/tcp: 8080
ingress: true
ingress_port: 8080
panel_icon: "mdi:file-document-edit"
panel_title: "EuroOffice"
