name: "WWW WordPress Suite"
description: "WordPress pre-configurato con i plugin Working With Web: image converter, TOC, minify, multivendor, malware scanner, blog2social e shortcoder."
version: "1.0.0"
slug: "www_wordpress_suite"
init: false
arch:
  - aarch64
  - amd64
startup: services
boot: auto
image: "ghcr.io/alfonsovertu/www-wordpress-suite-{arch}"
map:
  - config:rw
  - share:rw
options:
  use_internal_db: true
  db_host: "127.0.0.1"
  db_name: "www_suite"
  db_user: "suite_user"
  db_pass: "suite_pass_change_me"
  wp_domain: "localhost"
  wp_site_title: "WWW WordPress Suite"
  wp_admin_user: "admin"
  wp_admin_password: "CHANGEME"
  wp_admin_email: "admin@example.com"
schema:
  use_internal_db: bool
  db_host: str
  db_name: str
  db_user: str
  db_pass: password
  wp_domain: str
  wp_site_title: str
  wp_admin_user: str
  wp_admin_password: password
  wp_admin_email: str
ports:
  80/tcp: 8082
ports_description:
  80/tcp: "WordPress Interface"
panel_icon: "mdi:wordpress"
panel_title: "WWW Suite"
